<div 
    class="sidenav" 
    [ngClass]="isSidebarCollapsed() ? 'sidenav-collapsed' : ''"
>
    <div class="logo-container">
        <button class="logo" (click)="toggleCollapse()">
            <i class="fa-solid fa-mountain"></i>
        </button>
        <div class="logo-text">The Last<br>Testament</div>
    </div>

    <hr/>

    <div class="sidenav-nav">
        @for (item of items; track $index) {
            <li class="sidenav-nav-item">
                <a 
                    class="sidenav-nav-link" 
                    [routerLink]="item.routeLink" 
                    routerLinkActive="active"
                    [routerLinkActiveOptions]="{ exact: true }"
                >
                    <i class="sidenav-link-icon" [class]="item.icon"></i>
                    <span class="sidenav-link-text">{{item.label}}</span>
                </a>
            </li>
        }
    </div>
    <hr/>
    
    <div class="sidenav-nav">
        <li class="sidenav-nav-item">
            <a 
                class="sidenav-nav-link" 
                routerLink="/about" 
                routerLinkActive="active"
                [routerLinkActiveOptions]="{ exact: true }"
            >
                <i class="sidenav-link-icon fa-solid fa-circle-info"></i>
                <span class="sidenav-link-text">About Us</span>
            </a>
        </li>

    </div>

</div>
