<aside class="sidebar" [class.collapsed]="collapsed()">

  <!-- Header / Toggle -->
  <div class="sidebar-header">
    <button class="toggle-btn" (click)="toggleCollapse()" [attr.aria-label]="collapsed() ? 'Expand sidebar' : 'Collapse sidebar'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path [attr.d]="svgPath(collapsed() ? 'menu' : 'arrowLeft')"></path>
      </svg>
      <span class="material-symbols-outlined">home</span>
    </button>
    @if (!collapsed()) {
      <div class="brand">
        <span class="brand-name">The Last Testament</span>
      </div>
    }
  </div>

  <!-- Main Navigation -->
  <nav class="nav-section" aria-label="Main navigation">
    <ul class="nav-list" role="list">
      @for (item of navItems; track item.id) {
        <li class="nav-item" [class.has-children]="item.children?.length">

          <!-- Parent row -->
          <button
            class="nav-btn"
            [class.active]="isActive(item.id)"
            (click)="item.children ? toggleGroup(item.id, $event) : setActive(item.id)"
            [attr.aria-expanded]="item.children ? isGroupExpanded(item.id) : null"
          >
            <span class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path [attr.d]="svgPath(item.icon)"></path>
              </svg>
            </span>
            <span class="nav-label">{{ item.label }}</span>
            @if (item.badge && !item.children) {
              <span class="badge">{{ item.badge }}</span>
            }
            @if (item.children) {
              <span class="chevron" [class.rotated]="isGroupExpanded(item.id)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path [attr.d]="svgPath('chevronDown')"></path>
                </svg>
              </span>
            }
          </button>

          <!-- Children -->
          @if (item.children) {
            <ul
              class="sub-list"
              role="list"
              [@expandCollapse]="isGroupExpanded(item.id) ? 'open' : 'closed'"
            >
              @for (child of item.children; track child.id) {
                <li>
                  <button
                    class="nav-btn sub-btn"
                    [class.active]="isActive(child.id)"
                    (click)="setActive(child.id)"
                  >
                    <span class="nav-icon small">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path [attr.d]="svgPath(child.icon)"></path>
                      </svg>
                    </span>
                    <span class="nav-label">{{ child.label }}</span>
                    @if (child.badge) {
                      <span class="badge">{{ child.badge }}</span>
                    }
                  </button>
                </li>
              }
            </ul>
          }

        </li>
      }
    </ul>
  </nav>

  <!-- Divider -->
  <div class="divider"></div>

  <!-- Bottom Navigation -->
  <nav class="nav-section bottom" aria-label="Account navigation">
    <ul class="nav-list" role="list">
      @for (item of bottomItems; track item.id) {
        <li>
          <button class="nav-btn" [class.active]="isActive(item.id)" (click)="setActive(item.id)">
            <span class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path [attr.d]="svgPath(item.icon)"></path>
              </svg>
            </span>
            <span class="nav-label">{{ item.label }}</span>
          </button>
        </li> 
      }
    </ul>
  </nav>

    <!-- User Avatar -->
  <div class="user-row" >
    <div class="avatar">AM</div>
    @if (!collapsed()) {
      <div class="user-info">
        <span class="user-name">Aareb M.</span>
        <span class="user-role">Admin</span>
      </div>
    }
  </div>

</aside>
